<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Newsletter Generator</title>
</head>
<body>
    <TextArea />
    const ImgUp = ({ label, icon, src, onUpload, onRemove, ac, h = 80 }) => {
        const ref = useRef(null);

        const pickFile = () => {
            if (!src && ref.current) ref.current.click();
        };

        const onFile = (e) => {
            const f = e.target.files && e.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = (ev) => onUpload(ev.target.result);
            r.readAsDataURL(f);
            e.target.value = "";
        };

        return (
            <div>
                <Label>{label}</Label>
                <div style={{ display: "flex", gap: 6, alignItems: "flex-start" }}>
                    <div
                        onClick={pickFile}
                        style={{
                            flex: 1,
                            height: h,
                            borderRadius: 10,
                            border: "2px dashed #ddd",
                            background: "#fafafa",
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            cursor: src ? "default" : "pointer",
                            overflow: "hidden",
                            position: "relative",
                        }}
                    >
                        {src ? (
                            <>...
                            <img
                                src={src}
                                alt=""
                                style={{ width: "100%", height: "100%", objectFit: "cover" }}
                            />
                            <button
                                onClick={(e) => {
                                    e.stopPropagation();
                                    onRemove();
                                }}
                                style={{
                                    position: "absolute",
                                    top: 4,
                                    right: 4,
                                    width: 22,
                                    height: 22,
                                    borderRadius: "50%",
                                    background: "rgba(0,0,0,.5)",
                                    border: "none",
                                    color: "#fff",
                                    cursor: "pointer",
                                    fontSize: 12,
                                    display: "flex",
                                    alignItems: "center",
                                    justifyContent: "center",
                                }}
                            >
                                ✕
                            </button>
                            </>
                        ) : (
                            <span style={{ color: "#aaa", fontSize: 12 }}>{icon} อัพโหลด</span>
                        )}
                    </div>
                    <input
                        ref={ref}
                        type="file"
                        accept="image/*"
                        onChange={onFile}
                        style={{ display: "none" }}
                    />
                </div>
            </div>
        );
    };
