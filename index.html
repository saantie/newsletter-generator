<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Newsletter Generator</title>
<meta name="theme-color" content="#7b3fa0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-192x192.png">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
    html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:'Sarabun',sans-serif}
    #root{height:100%}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    
    /* ปรับปรุง Preview Area ให้ลากได้ทุกทิศทาง */
    .preview-container {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f0f0f5;
        position: relative;
        cursor: grab;
    }
    .preview-container:active { cursor: grabbing; }
    
    .preview-scroll {
        flex: 1;
        width: 100%;
        overflow: auto;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px;
        -webkit-overflow-scrolling: touch;
    }
</style>
</head>
<body>
<div id="root"></div>

<script>
const FIREBASE_CONFIG={apiKey:"AIzaSyA680sMySpmjo-2Myd8wZBAPYxqFDqDXdA",authDomain:"newsletter-generator-2e80d.firebaseapp.com",projectId:"newsletter-generator-2e80d"};
const ALLOWED_DOMAINS=[];
firebase.initializeApp(FIREBASE_CONFIG);
const auth=firebase.auth();
const googleProvider=new firebase.auth.GoogleAuthProvider();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>

<script type="text/babel">
const { useState, useRef, useCallback, useMemo, useEffect } = React;

// ... (โค้ดส่วน SVG, SVGs, COLORS, STYLES, STYLE_PROPS, mkTheme, Preview component ฯลฯ ยังคงเหมือนเดิมทั้งหมด) ...

// เก็บโค้ด Preview, CropImg, ImgUp ฯลฯ ไว้เหมือนเดิม (ยาวมาก ข้ามไปส่วนสำคัญ)

// ==================== แก้ไขส่วน App() ====================

function App(){
  // ... states เดิมทั้งหมด ...
  const [ck,setCk]=useState("purple");
  const [sk,setSk]=useState("formal");
  const [d,setD]=useState(EMPTY);
  const [scale,setScale]=useState(0.45);
  const [exporting,setExporting]=useState(false);
  const [exportMsg,setExportMsg]=useState("");
  const [loaded,setLoaded]=useState(false);
  const [hue,setHue]=useState(0);
  const [brightness,setBrightness]=useState(100);
  const [saturation,setSaturation]=useState(100);
  const [isPro,setIsPro]=useState(false);
  const [proExpiry,setProExpiry]=useState("");
  const [textAlign,setTextAlign]=useState("distribute");
  const [headerWm,setHeaderWm]=useState("");
  const [headerWmPos,setHeaderWmPos]=useState("50% 50%");
  const [headerWmZoom,setHeaderWmZoom]=useState(100);
  const [headerWmOp,setHeaderWmOp]=useState(50);
  const [showProPopup,setShowProPopup]=useState(false);
  const [slipImg,setSlipImg]=useState("");
  const [showColorCtrl,setShowColorCtrl]=useState(false);

  const wrapRef = useRef(null);
  const previewContainerRef = useRef(null);
  const isDragging = useRef(false);
  const startPos = useRef({ x: 0, y: 0 });
  const scrollStart = useRef({ x: 0, y: 0 });

  // ... useEffect, checkPro, set, addImg, rmImg ฯลฯ เหมือนเดิม ...

  // ==================== ฟังก์ชันใหม่: ลากเลื่อน Preview ได้ทุกทิศทาง ====================
  const handlePreviewMouseDown = useCallback((e) => {
    const container = previewContainerRef.current;
    if (!container) return;

    isDragging.current = true;
    container.style.cursor = 'grabbing';

    startPos.current = {
      x: e.type.includes('touch') ? e.touches[0].clientX : e.clientX,
      y: e.type.includes('touch') ? e.touches[0].clientY : e.clientY
    };

    scrollStart.current = {
      x: container.scrollLeft,
      y: container.scrollTop
    };

    document.addEventListener('mousemove', handlePreviewMouseMove);
    document.addEventListener('mouseup', handlePreviewMouseUp);
    document.addEventListener('touchmove', handlePreviewMouseMove, { passive: false });
    document.addEventListener('touchend', handlePreviewMouseUp);
  }, []);

  const handlePreviewMouseMove = useCallback((e) => {
    if (!isDragging.current) return;
    e.preventDefault();

    const container = previewContainerRef.current;
    if (!container) return;

    const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    const currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

    const dx = startPos.current.x - currentX;
    const dy = startPos.current.y - currentY;

    container.scrollLeft = scrollStart.current.x + dx;
    container.scrollTop = scrollStart.current.y + dy;
  }, []);

  const handlePreviewMouseUp = useCallback(() => {
    isDragging.current = false;
    const container = previewContainerRef.current;
    if (container) container.style.cursor = 'grab';
    
    document.removeEventListener('mousemove', handlePreviewMouseMove);
    document.removeEventListener('mouseup', handlePreviewMouseUp);
    document.removeEventListener('touchmove', handlePreviewMouseMove);
    document.removeEventListener('touchend', handlePreviewMouseUp);
  }, [handlePreviewMouseMove]);

  // ... handleExport, handleReset ฯลฯ เหมือนเดิม ...

  return (
    <>
      {/* ส่วน Pro Popup, Install Banner, Login ฯลฯ เหมือนเดิม */}

      <div style={{display:"flex",flexDirection:"column",height:"100vh",fontFamily:"'Sarabun',sans-serif",background:"#f5f5fa",color:"#333"}}>
        <div className="main-wrap">
          {/* Form Column - เหมือนเดิม */}

          {/* ==================== PREVIEW COLUMN (แก้ไขแล้ว) ==================== */}
          <div style={{flex:1,display:"flex",flexDirection:"column",background:"#f0f0f5"}}>
            {/* Zoom Bar */}
            <div style={{padding:"6px 0",display:"flex",justifyContent:"center",flexShrink:0,background:"#f0f0f5",borderBottom:"1px solid #e8e8e8",zIndex:5}}>
              <div style={{display:"flex",alignItems:"center",gap:2,background:"#fff",borderRadius:50,padding:"4px 6px",boxShadow:"0 2px 12px rgba(0,0,0,.08)",border:"1px solid #e8e8e8"}}>
                <span style={{fontSize:10,color:"#999",padding:"0 6px"}}>🔍</span>
                {[0.3,0.45,0.6,0.8,1.0,1.2].map(s => (
                  <button key={s} onClick={()=>setScale(s)} 
                    style={{padding:"4px 10px",border:"none",borderRadius:50,
                      background:scale===s?ac:"transparent",
                      color:scale===s?"#fff":"#888",cursor:"pointer",
                      fontSize:11,fontWeight:scale===s?600:400,minWidth:38}}>
                    {Math.round(s*100)}%
                  </button>
                ))}
              </div>
            </div>

            {/* Preview Area ที่ลากได้ทุกทิศทาง */}
            <div 
              ref={previewContainerRef}
              className="preview-container"
              onMouseDown={handlePreviewMouseDown}
              onTouchStart={handlePreviewMouseDown}
            >
              <div className="preview-scroll">
                <div style={{width: Math.ceil(794 * scale), height: Math.ceil(1123 * scale), flexShrink: 0}}>
                  <div ref={wrapRef} style={{transform: `scale(${scale})`, transformOrigin: "top left", width: 794, height: 1123}}>
                    <Preview 
                      ck={ck} 
                      sk={sk} 
                      d={d} 
                      id="main-preview" 
                      hue={hue} 
                      brightness={brightness} 
                      saturation={saturation} 
                      headerWm={headerWm} 
                      headerWmPos={headerWmPos} 
                      headerWmZoom={headerWmZoom} 
                      headerWmOp={headerWmOp} 
                      textAlign={textAlign} 
                      isPro={isPro}
                      onImgDrag={onImgDrag}
                      onImgZoom={onImgZoom}
                      onProfileDrag={onProfileDrag}
                      onProfileZoom={onProfileZoom}
                      onHdrWmDrag={p => setHeaderWmPos(p)}
                      onHdrWmZoom={z => setHeaderWmZoom(z)}
                      onLogoDrag={onLogoDrag}
                      onLogoZoom={onLogoZoom}
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ... ส่วน LoginScreen, Root, ReactDOM.render เหมือนเดิมทั้งหมด ...

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
