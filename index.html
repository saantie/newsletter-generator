const CropImg=({src,pos="50% 50%",zoom=100,style={},onDrag,onZoom})=>{
  const ref=useRef(null);const pinchRef=useRef(null);const posRef=useRef(pos);
  posRef.current=pos;
  const getDist=(t)=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
  const handleStart=(e)=>{
    if(e.touches&&e.touches.length===2&&onZoom){
      e.preventDefault();pinchRef.current={dist:getDist(e.touches),zoom};
      const mv=(ev)=>{ev.preventDefault();if(ev.touches.length===2&&pinchRef.current){const d=getDist(ev.touches);const ratio=d/pinchRef.current.dist;onZoom(Math.max(100,Math.min(400,Math.round(pinchRef.current.zoom*ratio))))}};
      const up=()=>{pinchRef.current=null;window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up)};
      window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);return;
    }
    if(!onDrag)return;e.preventDefault();
    const el=ref.current;if(!el)return;const rect=el.getBoundingClientRect();
    let lastX=e.touches?e.touches[0].clientX:e.clientX;
    let lastY=e.touches?e.touches[0].clientY:e.clientY;
    const mv=(ev)=>{ev.preventDefault();if(ev.touches&&ev.touches.length>=2)return;
      const cx=ev.touches?ev.touches[0].clientX:ev.clientX;const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
      const cur=posRef.current.split(' ');let px=parseFloat(cur[0])||50,py=parseFloat(cur[1])||50;
      const dx=((cx-lastX)/rect.width)*100;const dy=((cy-lastY)/rect.height)*100;
      lastX=cx;lastY=cy;
      onDrag(`${Math.round(Math.max(0,Math.min(100,px-dx)))}% ${Math.round(Math.max(0,Math.min(100,py-dy)))}%`);
    };
    const up=()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up)};
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
  };

  return(<div ref={ref} onMouseDown={(onDrag||onZoom)?handleStart:undefined} onTouchStart={(onDrag||onZoom)?handleStart:undefined} onWheel={onZoom?handleWheel:undefined}

const hex2hsl=(hex)=>{let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h=0,s=0,l=(mx+mn)/2;if(mx!==mn){const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=((g-b)/d+(g<b?6:0))/6;else if(mx===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6}return[h*360,s*100,l*100]};
const hsl2hex=(h,s,l)=>{h=((h%360)+360)%360;s/=100;l/=100;const a=s*Math.min(l,1-l);const f=(n)=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};return`#${f(0)}${f(8)}${f(4)}`};
const shiftHex=(hex,deg)=>{if(!hex||!hex.startsWith('#')||hex.length<7)return hex;const[h,s,l]=hex2hsl(hex.slice(0,7));return hsl2hex(h+deg,s,l)};
const shiftColors=(cl,deg)=>{if(deg===0)return cl;return{...cl,pri:shiftHex(cl.pri,deg),sec:shiftHex(cl.sec,deg),h1:shiftHex(cl.h1,deg),h2:shiftHex(cl.h2,deg),hl:shiftHex(cl.hl,deg),hlT:shiftHex(cl.hlT,deg),leaf:shiftHex(cl.leaf,deg)}};

const Input=({value,onChange,placeholder,ac,voice})=>(<div style={{display:"flex",gap:4,alignItems:"center"}}><input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{flex:1,padding:"9px 12px",border:"1px solid #ddd",borderRadius:10,background:"#fff",color:"#333",fontSize:13.5,outline:"none",fontFamily:"'Sarabun',sans-serif",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}} onFocus={e=>{e.target.style.borderColor=ac;e.target.style.boxShadow=`0 0 0 3px ${ac}18`}} onBlur={e=>{e.target.style.borderColor="#ddd";e.target.style.boxShadow="0 1px 3px rgba(0,0,0,.04)"}}/>{voice&&<VoiceBtn value={value} onChange={onChange}/>}</div>);
const TextArea=({value,onChange,placeholder,rows=4,ac})=>(<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{width:"100%",padding:"9px 12px",border:"1px solid #ddd",borderRadius:10,background:"#fff",color:"#333",fontSize:13.5,outline:"none",resize:"vertical",fontFamily:"'Sarabun',sans-serif",lineHeight:1.6,whiteSpace:"pre-wrap",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}} onFocus={e=>{e.target.style.borderColor=ac;e.target.style.boxShadow=`0 0 0 3px ${ac}18`}} onBlur={e=>{e.target.style.borderColor="#ddd";e.target.style.boxShadow="0 1px 3px rgba(0,0,0,.04)"}}/>);
const ImgUp=({label,icon,src,onUpload,onRemove,ac,h=80})=>{const ref=useRef(null);return(<div><Label>{label}</Label><div style={{display:"flex",gap:6,alignItems:"flex-start"}}><div onClick={()=>!src&&ref.current?.click()} style={{flex:1,height:h,borderRadius:10,border:"2px dashed #ddd",background:"#fafafa",display:"flex",alignItems:"center",justifyContent:"center",cursor:src?"default":"pointer",overflow:"hidden",position:"relative"}}>{src?(<><img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={e=>{e.stopPropagation();onRemove()}} style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"rgba(0,0,0,.5)",border:"none",color:"#fff",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></>):<span style={{color:"#aaa",fontSize:12}}>{icon} อัพโหลด</span>}</div></div><input ref={ref} type="file" accept="image/*" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>onUpload(ev.target.result);r.readAsDataURL(f);e.target.value=""}} style={{display:"none"}}/></div>)};

const VoiceBtn=({value,onChange})=>{
  const [rec,setRec]=useState(false);const rr=useRef(null);const base=useRef("");
  const start=()=>{
    if(rec){if(rr.current){rr.current.abort();rr.current=null}setRec(false);return}
    if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window))return;
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const r=new SR();r.lang="th-TH";r.continuous=false;r.interimResults=true;
    base.current=value||"";let acc="";
    r.onresult=e=>{let interim="";for(let i=0;i<e.results.length;i++){if(e.results[i].isFinal)acc=e.results[i][0].transcript;else interim=e.results[i][0].transcript}onChange(base.current+(acc||interim))};
    r.onend=()=>{if(acc)base.current=base.current+acc;acc="";if(rr.current&&rec){try{r.start()}catch(e){setRec(false);rr.current=null}}else setRec(false)};
    r.onerror=()=>{setRec(false);rr.current=null};
    r.start();rr.current=r;setRec(true);
    setTimeout(()=>{if(rr.current){rr.current.abort();rr.current=null;setRec(false)}},30000);
  };
  return<button onClick={start} style={{padding:"3px 6px",borderRadius:6,border:rec?"2px solid #e74c3c":"1px solid #ddd",background:rec?"#fce4ec":"#fafafa",color:rec?"#e74c3c":"#bbb",cursor:"pointer",fontSize:10,flexShrink:0,animation:rec?"pulse 1s infinite":"none"}} title="พิมพ์ด้วยเสียง">{rec?"⏹":"🎤"}</button>;
};

  useEffect(()=>{if(!loaded)return;const t=setTimeout(()=>sv({ck,sk,hue,brightness,saturation,textAlign,d:{...d,images:[]}}),1000);return()=>clearTimeout(t)},[ck,sk,hue,brightness,saturation,textAlign,d.orgName,d.subOrg,d.personName,d.personTitle,d.headline,d.bodyText,d.dateText,d.website,d.address,d.phone,d.headerTitle,d.headerTitleSize,d.hlColor,d.profileSize,d.logoSize,loaded]);

  useEffect(()=>{checkPro();const h=()=>{if(!document.hidden)checkPro()};document.addEventListener("visibilitychange",h);return()=>document.removeEventListener("visibilitychange",h)},[checkPro]);

  const set=useCallback((k,v)=>setD(p=>({...p,[k]:v})),[]);

  const handleExport=async()=>{
    if(usesPro){setShowProPopup(true);return}
    setExporting(true);setExportMsg("");
    try{
    if(!window.html2canvas){const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";document.head.appendChild(s);await new Promise((res,rej)=>{s.onload=res;s.onerror=()=>rej(new Error("โหลดไม่สำเร็จ"));setTimeout(()=>rej(new Error("Timeout")),10000)})}
    const wrap=wrapRef.current;if(!wrap)throw new Error("ไม่พบ");

    if(!el)throw new Error("ไม่พบ preview");
    const canvas=await window.html2canvas(el,{scale:4,useCORS:true,allowTaint:true,backgroundColor:"#ffffff",width:794,height:1123,logging:false,imageTimeout:30000,
                  onclone:(doc)=>{
        const divs=doc.querySelectorAll('[style]');
        divs.forEach(div=>{
          const s=div.style;
          const bgImg=s.backgroundImage;
          if(!bgImg||bgImg==="none"||!bgImg.includes("url("))return;
          const url=bgImg.replace(/^url\(["']?/,'').replace(/["']?\)$/,'');
          if(url.startsWith("data:image/svg")||url.includes("encodeURIComponent"))return;
          if(!url.startsWith("data:image/")&&!url.startsWith("blob:"))return;

          const rect=div.getBoundingClientRect();
          const cw=rect.width||div.offsetWidth||200;
          const ch=rect.height||div.offsetHeight||200;

          const bgPos=s.backgroundPosition||"50% 50%";
          const posArr=bgPos.split(" ");
          const px=parseFloat(posArr[0])||50;
          const py=parseFloat(posArr[1])||50;

          const bgSize=s.backgroundSize;
          let zoomFactor=1;
          if(bgSize&&bgSize!=='cover'&&bgSize.includes("%")){
            const pct=parseFloat(bgSize);
            if(pct>100) zoomFactor=pct/100;
          }

          const img=doc.createElement("img");
          img.src=url;
          img.crossOrigin="anonymous";

          const oldPos=s.position;
          if(oldPos!=='absolute'&&oldPos!=='fixed'&&oldPos!=='relative')s.position="relative";
          s.overflow="hidden";
          s.backgroundImage="none";

          if(zoomFactor>1){
            const wrapper=doc.createElement("div");
            wrapper.style.cssText=`position:absolute;top:0;left:0;width:${cw}px;height:${ch}px;overflow:hidden;pointer-events:none;`;
            const imgW=cw*zoomFactor;
            const imgH=ch*zoomFactor;
            const offsetX=-(px/100)*(imgW-cw);
            const offsetY=-(py/100)*(imgH-ch);
            img.style.cssText =  `position:absolute;top:${offsetY}px;left:${offsetX}px;` +  `width:${imgW}px;height:${imgH}px;` +  `object-fit:cover;object-position:${px}% ${py}%;` +  `pointer-events:none;`;
            wrapper.appendChild(img);
            div.insertBefore(wrapper,div.firstChild);
          }else{
  img.style.cssText =
    `position:absolute;top:0;left:0;width:${cw}px;height:${ch}px;` +
    `object-fit:cover;object-position:${px}% ${py}%;` +
    `pointer-events:none;`;
  div.insertBefore(img,div.firstChild);
}
        });
      }
    });

              if(isRecording){if(recRef.current){recRef.current.abort();recRef.current=null}setIsRecording(false);return}

              const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const r=new SR();r.lang="th-TH";r.continuous=false;r.interimResults=true;
              bodyBeforeRec.current=d.bodyText||"";
              let accumulated="";
              r.onresult=e=>{
                let interim="";
                for(let i=0;i<e.results.length;i++){
                  if(e.results[i].isFinal){accumulated=e.results[i][0].transcript}
                  else{interim=e.results[i][0].transcript}
                }
                const base=bodyBeforeRec.current;const nl=base&&!base.endsWith("\n")?"\n":"";
                set("bodyText",base+nl+(accumulated||interim));
              };
              r.onend=()=>{
                if(accumulated){bodyBeforeRec.current=(bodyBeforeRec.current?(bodyBeforeRec.current+"\n"):"")+accumulated;accumulated=""}
                if(recRef.current&&isRecording){try{r.start()}catch(e){setIsRecording(false);recRef.current=null}}
                else{setIsRecording(false)}
              };

              r.start();recRef.current=r;setIsRecording(true);
              setTimeout(()=>{if(recRef.current){recRef.current.abort();recRef.current=null;setIsRecording(false)}},120000)
            }} style={{padding:"3px 10px",borderRadius:8,border:isRecording?"2px solid #e74c3c":"1px solid #ddd",background:isRecording?"#fce4ec":"#fafafa",color:isRecording?"#e74c3c":"#888",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",gap:3,animation:isRecording?"pulse 1s infinite":"none"}}>{isRecording?"⏹️ หยุดบันทึก":"🎤 พิมพ์ด้วยเสียง"}</button></div><TextArea value={d.bodyText} onChange={v=>set("bodyText",v)} placeholder={"บรรทัดที่ 1...\nบรรทัดที่ 2..."} rows={6} ac={ac}/>{isRecording&&<div style={{fontSize:10,color:"#e74c3c",marginTop:4,display:"flex",alignItems:"center",gap:4}}>🔴 กำลังฟัง... พูดได้เลย</div>}</div>
          </div>
          <div className="sec"><div className="sec-t" style={{color:ac}}>📷 รูปภาพ — ลาก + เลื่อน scroll ซูมบน preview</div>
            <div style={{fontSize:11,color:ac,marginBottom:8,padding:"6px 12px",background:ac+"08",borderRadius:10,border:`1px solid ${ac}15`}}>{imgInfo}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>{d.images.map((img,i)=>(<div key={i} style={{display:"flex",gap:8,alignItems:"center",background:"#fafafa",borderRadius:10,padding:8,border:`1px solid ${i<3?ac+"30":"#e8e8e8"}`}}>
              <div style={{width:48,height:36,borderRadius:6,overflow:"hidden",flexShrink:0,backgroundImage:`url(${img.url})`,backgroundSize:img.zoom>100?`${img.zoom}%`:"cover",backgroundPosition:img.pos}}/>
              <div style={{flex:1,fontSize:11,color:"#888"}}>{i===0?"ซ้าย (เด่น)":i<3?`บน ${i+1}`:`ล่าง ${i-2}`}{img.zoom>100?` 🔍${img.zoom}%`:""}</div>
              <button onClick={()=>rmImg(i)} style={{padding:"4px 10px",borderRadius:8,background:"#fff",border:"1px solid #f0d0d0",color:"#e74c3c",cursor:"pointer",fontSize:11,flexShrink:0}}>✕</button>
            </div>))}</div>
            {d.images.length<9&&<button onClick={()=>imgRef.current?.click()} style={{width:"100%",padding:"12px",borderRadius:10,border:"2px dashed #ddd",background:"#fafafa",color:"#aaa",cursor:"pointer",fontSize:13}}>+ เพิ่มรูป</button>}
            <input ref={imgRef} type="file" accept="image/*" multiple onChange={e=>{Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(f)});e.target.value=""}} style={{display:"none"}}/>
          </div>
          <div className="sec"><div className="sec-t" style={{color:ac}}>📍 ติดต่อ</div><div className="fld"><Label>เว็บไซต์</Label><Input value={d.website} onChange={v=>set("website",v)} placeholder="www.example.com" ac={ac} voice/></div><div className="fld"><Label>ที่อยู่</Label><Input value={d.address} onChange={v=>set("address",v)} placeholder="ที่อยู่สำนักงาน" ac={ac} voice/></div><div className="fld"><Label>เบอร์โทร</Label><Input value={d.phone} onChange={v=>set("phone",v)} placeholder="042-897-037" ac={ac} voice/></div><ImgUp label="QR Code" icon="📱" src={d.qrUrl} onUpload={v=>set("qrUrl",v)} onRemove={()=>set("qrUrl","")} ac={ac} h={80}/></div>
          {/* Download + Reset */}
          <div style={{padding:"12px 0",borderTop:`2px solid ${ac}20`}}>
            {exportMsg&&<div style={{padding:"6px 12px",borderRadius:8,marginBottom:8,fontSize:12,textAlign:"center",background:exportMsg.startsWith("✅")?"#e8f5e9":"#fce4ec",color:exportMsg.startsWith("✅")?"#2e7d32":"#c62828"}}>{exportMsg}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={handleReset} style={{padding:"10px 14px",border:"none",borderRadius:10,background:`linear-gradient(135deg,${ac}20,${fc2}20)`,color:ac,cursor:"pointer",fontSize:13}}>🔄</button>
              <button onClick={handleExport} disabled={exporting||!d.headline} style={{flex:1,padding:"12px",border:"none",borderRadius:10,background:!d.headline?"#eee":`linear-gradient(135deg,${ac},${fc2})`,color:!d.headline?"#bbb":"#fff",cursor:!d.headline?"default":"pointer",fontSize:15,fontWeight:600,fontFamily:"'Kanit',sans-serif",boxShadow:d.headline?`0 4px 12px ${ac}30`:"none"}}>{exporting?"⏳ กำลังสร้าง...":"📥 ดาวน์โหลด"}</button>
            </div>
          </div>
          <div style={{height:20}}/>
          </div>{/* end form fields */}
        </div>{/* end single scroll */}
      </div>

            {/* Preview column */}
      <div className="prev-col">
                {/* Zoom bar */}
        <div style={{padding:"6px 0",display:"flex",justifyContent:"center",flexShrink:0,background:"#f0f0f5",borderBottom:"1px solid #e8e8e8",zIndex:5}}>
          <div style={{display:"flex",alignItems:"center",gap:2,background:"#fff",borderRadius:50,padding:"4px 6px",boxShadow:"0 2px 12px rgba(0,0,0,.08)",border:"1px solid #e8e8e8"}}>
            <span style={{fontSize:10,color:"#999",padding:"0 6px"}}>🔍</span>
            {[0.3,0.45,0.6,0.8,1.0,1.2].map(s=>(<button key={s} onClick={()=>setScale(s)} style={{padding:"4px 10px",border:"none",borderRadius:50,background:scale===s?ac:"transparent",color:scale===s?"#fff":"#888",cursor:"pointer",fontSize:11,fontWeight:scale===s?600:400,fontFamily:"'Sarabun',sans-serif",minWidth:38}}>{Math.round(s*100)}%</button>))}
          </div>
        </div>
        {/* Scrollable preview area — supports both directions for high zoom */}
                <div style={{flex:1,overflowX:"auto",overflowY:"auto",WebkitOverflowScrolling:"touch",display:"flex",flexDirection:"column",alignItems:"flex-start",padding:24}}>
       <div style={{width:Math.ceil(794*scale),height:Math.ceil(1123*scale),flexShrink:0,margin:0}}>
          <div ref={wrapRef} style={{transform:`scale(${scale})`,transformOrigin:"top left",width:794,height:1123}}>
            <Preview ck={ck} sk={sk} d={d} id="main-preview" hue={hue} brightness={brightness} saturation={saturation} headerWm={headerWm} headerWmPos={headerWmPos} headerWmZoom={headerWmZoom} headerWmOp={headerWmOp} textAlign={textAlign} isPro={isPro} onImgDrag={onImgDrag} onImgZoom={onImgZoom} onProfileDrag={onProfileDrag} onProfileZoom={onProfileZoom} onHdrWmDrag={p=>setHeaderWmPos(p)} onHdrWmZoom={z=>setHeaderWmZoom(z)} onLogoDrag={onLogoDrag} onLogoZoom={onLogoZoom}/>
          </div>

        <div style={{height:80,flexShrink:0}}/>

}

const GoogleIcon=()=>(<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>);
function LoginScreen(){
  const [error,setError]=useState("");const [loading,setLoading]=useState(false);
  const [email,setEmail]=useState("");const [pass,setPass]=useState("");
  const [mode,setMode]=useState("google"); // google | email
  const checkDomain=(em)=>{if(!ALLOWED_DOMAINS||ALLOWED_DOMAINS.length===0)return true;return ALLOWED_DOMAINS.some(d=>em.endsWith(d))};
  const handleGoogle=async()=>{setLoading(true);setError("");try{const r=await auth.signInWithPopup(googleProvider);if(!checkDomain(r.user.email)){await auth.signOut();setError(`อีเมล ${r.user.email} ไม่ได้รับอนุญาต`)}}catch(err){if(err.code!=="auth/popup-closed-by-user")setError(err.code==="auth/popup-blocked"?"กรุณาอนุญาต popup แล้วลองใหม่":err.message)}setLoading(false)};
  const handleEmail=async(isRegister)=>{
    if(!email||!pass){setError("กรุณากรอก Email และรหัสผ่าน");return}
    setLoading(true);setError("");
    try{
      if(isRegister){const r=await auth.createUserWithEmailAndPassword(email,pass);if(!checkDomain(r.user.email)){await auth.signOut();setError(`อีเมล ${r.user.email} ไม่ได้รับอนุญาต`)}}
      else{const r=await auth.signInWithEmailAndPassword(email,pass);if(!checkDomain(r.user.email)){await auth.signOut();setError(`อีเมล ${r.user.email} ไม่ได้รับอนุญาต`)}}
    }catch(err){
      const m={"auth/user-not-found":"ไม่พบบัญชีนี้","auth/wrong-password":"รหัสผ่านไม่ถูกต้อง","auth/email-already-in-use":"อีเมลนี้ถูกใช้แล้ว","auth/weak-password":"รหัสผ่านต้อง 6 ตัวขึ้นไป","auth/invalid-email":"รูปแบบอีเมลไม่ถูกต้อง","auth/invalid-credential":"อีเมลหรือรหัสผ่านไม่ถูกต้อง"};
      setError(m[err.code]||err.message);
    }setLoading(false)};
  const btnS={width:"100%",padding:"12px 20px",border:"1px solid #ddd",borderRadius:12,background:"#fff",color:"#333",fontSize:15,fontWeight:600,fontFamily:"'Kanit',sans-serif",cursor:loading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12,opacity:loading?.6:1};
  const inputS={width:"100%",padding:"10px 14px",border:"1px solid #ddd",borderRadius:10,fontSize:14,outline:"none",fontFamily:"'Sarabun',sans-serif",marginBottom:8};
  return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f8f6ff,#eef2ff,#f0f8ff)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{width:"100%",maxWidth:400,background:"#fff",borderRadius:20,padding:"36px 28px",boxShadow:"0 20px 60px rgba(0,0,0,.08)"}}>
      <div style={{textAlign:"center",marginBottom:28}}><div style={{fontSize:50,marginBottom:8}}>📰</div><div style={{fontFamily:"'Kanit',sans-serif",fontSize:24,fontWeight:700,color:"#333"}}>Newsletter Generator</div><div style={{color:"#999",fontSize:13,marginTop:4}}>สร้างจดหมายข่าวประชาสัมพันธ์</div></div>
      {mode==="google"?(<>
        <button onClick={handleGoogle} disabled={loading} style={btnS}>{loading?<span style={{color:"#999"}}>⏳</span>:<><GoogleIcon/><span>เข้าสู่ระบบด้วย Google</span></>}</button>
        <div style={{textAlign:"center",margin:"16px 0",fontSize:12,color:"#ccc"}}>— หรือ —</div>
        <button onClick={()=>setMode("email")} style={{...btnS,background:"#f8f8ff",fontSize:13,fontWeight:400,border:"1px solid #e0e0e0"}}><span>📧 เข้าสู่ระบบด้วย Email</span></button>
      </>):(<>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" style={inputS}/>
        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="รหัสผ่าน (6 ตัวขึ้นไป)" style={inputS}/>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <button onClick={()=>handleEmail(false)} disabled={loading} style={{...btnS,flex:1,fontSize:13}}>{loading?"⏳":"🔑 เข้าสู่ระบบ"}</button>
          <button onClick={()=>handleEmail(true)} disabled={loading} style={{...btnS,flex:1,fontSize:13,background:"#f0f8ff"}}>{loading?"⏳":"📝 สมัครใหม่"}</button>
        </div>
        <button onClick={()=>{setMode("google");setError("")}} style={{width:"100%",padding:"8px",border:"none",background:"none",color:"#888",cursor:"pointer",fontSize:12}}>← กลับหน้า Google Login</button>
      </>)}
      {error&&<div style={{padding:"10px",borderRadius:10,marginTop:12,fontSize:12,color:"#e74c3c",background:"#fef0ef",textAlign:"center"}}>{error}</div>}
    </div></div>)}
function Root(){const [user,setUser]=useState(null);const [checking,setChecking]=useState(true);useEffect(()=>{const unsub=auth.onAuthStateChanged(u=>{if(u&&ALLOWED_DOMAINS&&ALLOWED_DOMAINS.length>0){if(!ALLOWED_DOMAINS.some(d=>u.email.endsWith(d))){auth.signOut();setUser(null);setChecking(false);return}}if(u)window.__userEmail=u.email;setUser(u);setChecking(false)});return unsub},[]);if(checking)return(<div style={{minHeight:"100vh",background:"#f8f8ff",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontSize:48}}>📰</div><div style={{color:"#999",fontFamily:"'Kanit',sans-serif"}}>กำลังตรวจสอบ...</div></div>);if(!user)return <LoginScreen/>;return(<div style={{height:"100vh",display:"flex",flexDirection:"column"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 14px",background:"#fff",borderBottom:"1px solid #eee",flexShrink:0,fontSize:12}}><div style={{display:"flex",alignItems:"center",gap:8}}>{user.photoURL&&<img src={user.photoURL} style={{width:22,height:22,borderRadius:"50%"}} alt="" referrerPolicy="no-referrer"/>}<span style={{color:"#888"}}>{user.displayName||user.email}</span></div><button onClick={()=>auth.signOut()} style={{padding:"4px 12px",border:"1px solid #ddd",borderRadius:6,background:"#fafafa",color:"#888",cursor:"pointer",fontSize:11}}>ออกจากระบบ</button></div><div style={{flex:1,overflow:"hidden"}}><App/></div></div>)}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script></body></html>
