const Label=({children})=><label style={{display:"block",fontSize:12,fontWeight:600,color:"#aab",marginBottom:4,fontFamily:"'Kanit',sans-serif"}}>{children}</label>;

const ImgUp=({label,icon,src,onUpload,onRemove,pos,onPos,ac,h=80})=>{const ref=useRef(null);return(<div><Label>{label}</Label><div style={{display:"flex",gap:6,alignItems:"flex-start"}}><div onClick={()=>!src&&ref.current?.click()} style={{flex:1,height:h,borderRadius:8,border:"2px dashed #252540",background:"#0e0e1e",display:"flex",alignItems:"center",justifyContent:"center",cursor:src?"default":"pointer",overflow:"hidden",position:"relative"}}>{src?(<><img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:pos||"center"}}/><button onClick={e=>{e.stopPropagation();onRemove()}} style={{position:"absolute",top:3,right:3,width:20,height:20,borderRadius:"50%",background:"rgba(0,0,0,.6)",border:"none",color:"#fff",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></>):<span style={{color:"#444",fontSize:12}}>{icon} อัพโหลด</span>}</div>{src&&onPos&&<DragPosPicker value={pos||"50% 50%"} onChange={onPos} ac={ac} thumbSrc={src}/>}</div><input ref={ref} type="file" accept="image/*" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>onUpload(ev.target.result);r.readAsDataURL(f);e.target.value=""}} style={{display:"none"}}/></div>)};

  useEffect(()=>{(async()=>{const saved=await ld();if(saved){if(saved.ck&&COLORS[saved.ck])setCk(saved.ck);if(saved.sk&&STYLES[saved.sk])setSk(saved.sk);if(saved.d)setD({...EMPTY,...saved.d,images:[]});}setLoaded(true)})()},[]);

          <div className="sec"><div className="sec-t" style={{color:ac}}>🏢 หน่วยงาน</div><div className="fld"><Label>ชื่อหน่วยงาน *</Label><Input value={d.orgName} onChange={v=>set("orgName",v)} placeholder="สำนักงานสาธารณสุข" ac={ac}/></div><div className="fld"><Label>หน่วยงานย่อย</Label><Input value={d.subOrg} onChange={v=>set("subOrg",v)} placeholder="อำเภอนาแห้ว" ac={ac}/></div><div style={{display:"flex",gap:10}}><div style={{flex:1}}><ImgUp label="โลโก้" icon="🏢" src={d.logoUrl} onUpload={v=>set("logoUrl",v)} onRemove={()=>set("logoUrl","")} ac={ac} h={65}/></div><div style={{flex:1}}><ImgUp label="โปรไฟล์" icon="👤" src={d.profileUrl} onUpload={v=>set("profileUrl",v)} onRemove={()=>set("profileUrl","")} pos={d.profilePos} onPos={v=>set("profilePos",v)} ac={ac} h={65}/></div></div></div>
          <div className="sec"><div className="sec-t" style={{color:ac}}>👤 ผู้บริหาร</div><div className="fld"><Label>ชื่อ-สกุล</Label><Input value={d.personName} onChange={v=>set("personName",v)} placeholder="นางทัศนา โกศล" ac={ac}/></div><div className="fld"><Label>ตำแหน่ง</Label><Input value={d.personTitle} onChange={v=>set("personTitle",v)} placeholder="สาธารณสุขอำเภอนาแห้ว" ac={ac}/></div></div>
          <div className="sec"><div className="sec-t" style={{color:ac}}>📝 เนื้อหา</div><div className="fld"><Label>หัวข้อข่าว *</Label><TextArea value={d.headline} onChange={v=>set("headline",v)} placeholder="หัวข้อกิจกรรม" rows={2} ac={ac}/></div><div className="fld"><Label>วันที่</Label><Input value={d.dateText} onChange={v=>set("dateText",v)} placeholder="วันที่ 13 มีนาคม 2569" ac={ac}/></div><div className="fld"><Label>เนื้อหา (Enter = ขึ้นบรรทัดใหม่)</Label><TextArea value={d.bodyText} onChange={v=>set("bodyText",v)} placeholder={"บรรทัดที่ 1...\nบรรทัดที่ 2..."} rows={6} ac={ac}/></div></div>
          <div className="sec"><div className="sec-t" style={{color:ac}}>📷 รูปภาพ — ลากจุดเพื่อจัด crop</div><div style={{fontSize:11,color:fc2,marginBottom:8,padding:"5px 10px",background:ac+"10",borderRadius:6}}>{imgInfo}</div><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:8}}>{d.images.map((img,i)=>(<div key={i} style={{display:"flex",gap:8,alignItems:"center",background:"#0e0e20",borderRadius:8,padding:8,border:`1px solid ${i<3?ac+"30":fc2+"30"}`}}><div style={{fontSize:9,color:i<3?"#adf":"#fca",width:14,textAlign:"center",flexShrink:0}}>{i<3?"▲":"▼"}</div><DragPosPicker value={img.pos} onChange={pos=>setImgPos(i,pos)} ac={ac} thumbSrc={img.url}/><div style={{flex:1,fontSize:10,color:"#666"}}>{i===0?"ซ้าย (เด่น)":i<3?`บน ${i+1}`:`ล่าง ${i-2}`}</div><button onClick={()=>rmImg(i)} style={{padding:"4px 10px",borderRadius:5,background:"#2a1520",border:"1px solid #442030",color:"#f88",cursor:"pointer",fontSize:11,flexShrink:0}}>ลบ</button></div>))}</div>{d.images.length<6&&<button onClick={()=>imgRef.current?.click()} style={{width:"100%",padding:"10px",borderRadius:8,border:"2px dashed #252540",background:"#0e0e1e",color:"#555",cursor:"pointer",fontSize:13}}>+ เพิ่มรูป</button>}<input ref={imgRef} type="file" accept="image/*" multiple onChange={e=>{Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(f)});e.target.value=""}} style={{display:"none"}}/></div>
          <div className="sec"><div className="sec-t" style={{color:ac}}>📍 ติดต่อ</div><div className="fld"><Label>เว็บไซต์</Label><Input value={d.website} onChange={v=>set("website",v)} placeholder="www.example.com" ac={ac}/></div><div className="fld"><Label>ที่อยู่</Label><Input value={d.address} onChange={v=>set("address",v)} placeholder="ที่อยู่สำนักงาน" ac={ac}/></div><div className="fld"><Label>เบอร์โทร</Label><Input value={d.phone} onChange={v=>set("phone",v)} placeholder="042-897-037" ac={ac}/></div><ImgUp label="QR Code" icon="📱" src={d.qrUrl} onUpload={v=>set("qrUrl",v)} onRemove={()=>set("qrUrl","")} ac={ac} h={80}/></div>
          <div style={{height:20}}/>
        </div>
        <div style={{padding:"8px 14px",borderTop:"1px solid #1a1a2e",background:"#0a0a18",flexShrink:0}}>
          {exportMsg&&<div style={{padding:"5px 10px",borderRadius:8,marginBottom:6,fontSize:12,textAlign:"center",background:exportMsg.startsWith("✅")?"#16a34a22":"#dc262622",color:exportMsg.startsWith("✅")?"#4ade80":"#f87171"}}>{exportMsg}</div>}
          <div style={{display:"flex",gap:6}}><button onClick={handleReset} style={{padding:"9px 12px",border:"1px solid #252540",borderRadius:8,background:"#111124",color:"#888",cursor:"pointer",fontSize:12}}>🔄</button><button onClick={handleExport} disabled={exporting||!d.headline} style={{flex:1,padding:"9px",border:"none",borderRadius:8,background:!d.headline?"#1a1a2e":`linear-gradient(135deg,${ac},${fc2})`,color:!d.headline?"#444":"#fff",cursor:!d.headline?"default":"pointer",fontSize:14,fontWeight:600,fontFamily:"'Kanit',sans-serif"}}>{exporting?"⏳ กำลังสร้าง...":"📥 ส่งออก PNG"}</button></div>
        </div>
      </div>
      <div className="prev-col">
        <div style={{marginBottom:8,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"center",flexShrink:0}}><span style={{fontSize:10,color:"#444"}}>ซูม:</span>{[0.3,0.4,0.52,0.65,0.8].map(s=>(<button key={s} onClick={()=>setScale(s)} style={{padding:"2px 6px",border:scale===s?`1px solid ${ac}`:"1px solid #1a1a2e",borderRadius:4,background:scale===s?ac+"18":"transparent",color:scale===s?ac:"#444",cursor:"pointer",fontSize:10}}>{Math.round(s*100)}%</button>))}</div>
        <div style={{width:Math.ceil(794*scale),height:Math.ceil(1123*scale),flexShrink:0}}><div ref={wrapRef} style={{transform:`scale(${scale})`,transformOrigin:"top left",width:794,height:1123}}><Preview ck={ck} sk={sk} d={d} id="main-preview"/></div></div>
        <div style={{height:20,flexShrink:0}}/>
      </div>
    </div></div>
  </>);
}

const GoogleIcon=()=>(<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>);

function LoginScreen(){
  const [error,setError]=useState("");const [loading,setLoading]=useState(false);
  const checkDomain=(email)=>{if(!ALLOWED_DOMAINS||ALLOWED_DOMAINS.length===0)return true;return ALLOWED_DOMAINS.some(d=>email.endsWith(d))};
  const handleGoogle=async()=>{setLoading(true);setError("");try{const r=await auth.signInWithPopup(googleProvider);if(!checkDomain(r.user.email)){await auth.signOut();setError(`อีเมล ${r.user.email} ไม่ได้รับอนุญาต`)}}catch(err){if(err.code!=="auth/popup-closed-by-user")setError(err.code==="auth/popup-blocked"?"กรุณาอนุญาต popup แล้วลองใหม่":err.message)}setLoading(false)};
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0a1a,#1a1035,#0a0a1a)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400,background:"#111128",borderRadius:20,padding:"40px 32px",boxShadow:"0 20px 60px rgba(0,0,0,.5)",border:"1px solid #2a2a4a"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:56,marginBottom:10}}>📰</div>
          <div style={{fontFamily:"'Kanit',sans-serif",fontSize:26,fontWeight:700,background:"linear-gradient(135deg,#7b3fa0,#d4a0d8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Newsletter Generator</div>
          <div style={{color:"#666",fontSize:14,marginTop:6}}>สร้างจดหมายข่าวประชาสัมพันธ์</div>
        </div>
        <button onClick={handleGoogle} disabled={loading} style={{width:"100%",padding:"14px 20px",border:"1px solid #ddd",borderRadius:12,background:"#fff",color:"#333",fontSize:16,fontWeight:600,fontFamily:"'Kanit',sans-serif",cursor:loading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12,opacity:loading?.6:1,transition:"all .2s"}}>
          {loading?<span style={{color:"#666"}}>⏳ กำลังเข้าสู่ระบบ...</span>:<><GoogleIcon/><span>เข้าสู่ระบบด้วย Google</span></>}
        </button>
        {error&&<div style={{padding:"10px 14px",borderRadius:10,marginTop:14,fontSize:13,color:"#f87171",background:"#dc262615",border:"1px solid #dc262630",textAlign:"center"}}>{error}</div>}
        <div style={{textAlign:"center",marginTop:24,fontSize:11,color:"#444",lineHeight:1.6}}>
          เข้าสู่ระบบด้วยบัญชี Google ของคุณ
          {ALLOWED_DOMAINS&&ALLOWED_DOMAINS.length>0&&<><br/><span style={{color:"#666"}}>จำกัดเฉพาะ: {ALLOWED_DOMAINS.join(", ")}</span></>}
        </div>
      </div>
    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);const [checking,setChecking]=useState(true);
  useEffect(()=>{const unsub=auth.onAuthStateChanged(u=>{
    if(u&&ALLOWED_DOMAINS&&ALLOWED_DOMAINS.length>0){if(!ALLOWED_DOMAINS.some(d=>u.email.endsWith(d))){auth.signOut();setUser(null);setChecking(false);return}}
    setUser(u);setChecking(false)});return unsub},[]);
  if(checking)return(<div style={{minHeight:"100vh",background:"#08081a",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontSize:48}}>📰</div><div style={{color:"#666",fontFamily:"'Kanit',sans-serif",fontSize:16}}>กำลังตรวจสอบ...</div></div>);
  if(!user)return <LoginScreen/>;
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 14px",background:"#08081a",borderBottom:"1px solid #1a1a2e",flexShrink:0,fontSize:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {user.photoURL&&<img src={user.photoURL} style={{width:22,height:22,borderRadius:"50%"}} alt="" referrerPolicy="no-referrer"/>}
          <span style={{color:"#888"}}>{user.displayName||user.email}</span>
        </div>
        <button onClick={()=>auth.signOut()} style={{padding:"4px 12px",border:"1px solid #2a2a4a",borderRadius:6,background:"#111128",color:"#888",cursor:"pointer",fontSize:11}}>ออกจากระบบ</button>
      </div>
      <div style={{flex:1,overflow:"hidden"}}><App/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
