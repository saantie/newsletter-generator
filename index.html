const FI=({src,w,h,style={}})=><img src={src} width={w||h} height={h||w} style={{position:"absolute",pointerEvents:"none",...style}} alt=""/>;
const CropImg=({src,pos="50% 50%",zoom=100,style={},onDrag,onZoom})=>{
  const ref=useRef(null);
  const handleStart=(e)=>{
    if(!onDrag)return;
    e.preventDefault();
    const el=ref.current;if(!el)return;
    const rect=el.getBoundingClientRect();
    const startX=e.touches?e.touches[0].clientX:e.clientX;const startY=e.touches?e.touches[0].clientY:e.clientY;
    const pp=pos.split(' ');let px=parseFloat(pp[0])||50,py=parseFloat(pp[1])||50;
    const calc=(ev)=>{const cx=ev.touches?ev.touches[0].clientX:ev.clientX;const cy=ev.touches?ev.touches[0].clientY:ev.clientY;const dx=(cx-startX)/rect.width*100;const dy=(cy-startY)/rect.height*100;onDrag(`${Math.round(Math.max(0,Math.min(100,px-dx)))}% ${Math.round(Math.max(0,Math.min(100,py-dy)))}%`)};
    const mv=(ev)=>{ev.preventDefault();calc(ev)};
    const up=()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up)};
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
  };
  const handleWheel=(e)=>{
    if(!onZoom)return;
    e.preventDefault();e.stopPropagation();
    const delta=e.deltaY>0?-10:10;
    onZoom(Math.max(100,Math.min(400,zoom+delta)));
  };
  return(<div ref={ref} onMouseDown={onDrag?handleStart:undefined} onTouchStart={onDrag?handleStart:undefined} onWheel={onZoom?handleWheel:undefined} style={{backgroundImage:src?`url(${src})`:"none",backgroundSize:zoom>100?`${zoom}%`:"cover",backgroundPosition:pos,backgroundRepeat:"no-repeat",backgroundColor:"#e8e8e8",cursor:onDrag?"crosshair":"default",...style}}>{!src&&<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:12}}>📷</div>}</div>);
};

/* ─── Hue Shift ─── */
const hex2hsl=(hex)=>{let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h=0,s=0,l=(mx+mn)/2;if(mx!==mn){const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=((g-b)/d+(g<b?6:0))/6;else if(mx===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6}return[h*360,s*100,l*100]};
const hsl2hex=(h,s,l)=>{h=((h%360)+360)%360;s/=100;l/=100;const a=s*Math.min(l,1-l);const f=(n)=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};return`#${f(0)}${f(8)}${f(4)}`};
const shiftHex=(hex,deg)=>{if(!hex||!hex.startsWith('#')||hex.length<7)return hex;const[h,s,l]=hex2hsl(hex.slice(0,7));return hsl2hex(h+deg,s,l)};
const shiftColors=(cl,deg)=>{if(deg===0)return cl;return{...cl,pri:shiftHex(cl.pri,deg),sec:shiftHex(cl.sec,deg),h1:shiftHex(cl.h1,deg),h2:shiftHex(cl.h2,deg),hl:shiftHex(cl.hl,deg),hlT:shiftHex(cl.hlT,deg),leaf:shiftHex(cl.leaf,deg)}};

/* ─── Google Sheets License Check ─── */
// ใส่ URL ของ Google Sheet ที่ publish เป็น CSV (คอลัมน์ A = email ที่อนุญาต)
const LICENSE_SHEET_URL = "";  // เช่น "https://docs.google.com/spreadsheets/d/YOUR_ID/gviz/tq?tqx=out:csv"
const checkLicenseFromSheet = async (email) => {
  if (!LICENSE_SHEET_URL || !email) return false;
  try {
    const res = await fetch(LICENSE_SHEET_URL);
    const csv = await res.text();
    const emails = csv.split("\n").map(r => r.replace(/"/g, "").trim().toLowerCase());
    return emails.includes(email.toLowerCase());
  } catch (e) { return false; }
};

/* ─── Form Helpers (Light UI) ─── */
const Label=({children})=><label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:4,fontFamily:"'Kanit',sans-serif"}}>{children}</label>;
const Input=({value,onChange,placeholder,ac})=>(<input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"9px 12px",border:"1px solid #ddd",borderRadius:10,background:"#fff",color:"#333",fontSize:13.5,outline:"none",fontFamily:"'Sarabun',sans-serif",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}} onFocus={e=>{e.target.style.borderColor=ac;e.target.style.boxShadow=`0 0 0 3px ${ac}18`}} onBlur={e=>{e.target.style.borderColor="#ddd";e.target.style.boxShadow="0 1px 3px rgba(0,0,0,.04)"}}/>);
const TextArea=({value,onChange,placeholder,rows=4,ac})=>(<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{width:"100%",padding:"9px 12px",border:"1px solid #ddd",borderRadius:10,background:"#fff",color:"#333",fontSize:13.5,outline:"none",resize:"vertical",fontFamily:"'Sarabun',sans-serif",lineHeight:1.6,whiteSpace:"pre-wrap",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}} onFocus={e=>{e.target.style.borderColor=ac;e.target.style.boxShadow=`0 0 0 3px ${ac}18`}} onBlur={e=>{e.target.style.borderColor="#ddd";e.target.style.boxShadow="0 1px 3px rgba(0,0,0,.04)"}}/>);
const ImgUp=({label,icon,src,onUpload,onRemove,ac,h=80})=>{const ref=useRef(null);return(<div><Label>{label}</Label><div style={{display:"flex",gap:6,alignItems:"flex-start"}}><div onClick={()=>!src&&ref.current?.click()} style={{flex:1,height:h,borderRadius:10,border:"2px dashed #ddd",background:"#fafafa",display:"flex",alignItems:"center",justifyContent:"center",cursor:src?"default":"pointer",overflow:"hidden",position:"relative"}}>{src?(<><img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={e=>{e.stopPropagation();onRemove()}} style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"rgba(0,0,0,.5)",border:"none",color:"#fff",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></>):<span style={{color:"#aaa",fontSize:12}}>{icon} อัพโหลด</span>}</div></div><input ref={ref} type="file" accept="image/*" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>onUpload(ev.target.result);r.readAsDataURL(f);e.target.value=""}} style={{display:"none"}}/></div>)};

const EMPTY={orgName:"",subOrg:"",personName:"",personTitle:"",headline:"",bodyText:"",dateText:"",website:"",address:"",phone:"",profileUrl:"",profilePos:"50% 50%",profileZoom:100,logos:[],qrUrl:"",headerTitle:"ประชาสัมพันธ์",headerTitleSize:38,images:[]};

function App(){
  const [ck,setCk]=useState("purple");const [sk,setSk]=useState("formal");const [d,setD]=useState(EMPTY);const [scale,setScale]=useState(0.45);const [exporting,setExporting]=useState(false);const [exportMsg,setExportMsg]=useState("");const [loaded,setLoaded]=useState(false);const imgRef=useRef(null);const wrapRef=useRef(null);
  const [hue,setHue]=useState(0);
  const [brightness,setBrightness]=useState(100);
  const [isPro,setIsPro]=useState(false);
  const [textAlign,setTextAlign]=useState("distribute");
  const [headerWm,setHeaderWm]=useState("");
  const [headerWmPos,setHeaderWmPos]=useState("50% 50%");
  const [headerWmZoom,setHeaderWmZoom]=useState(100);
  const [showProPopup,setShowProPopup]=useState(false);
  const [slipImg,setSlipImg]=useState("");
  const [installPrompt,setInstallPrompt]=useState(null);
  const [showInstall,setShowInstall]=useState(false);

  // PWA install prompt
  useEffect(()=>{const h=(e)=>{e.preventDefault();setInstallPrompt(e);if(!window.matchMedia("(display-mode: standalone)").matches)setShowInstall(true)};window.addEventListener("beforeinstallprompt",h);return()=>window.removeEventListener("beforeinstallprompt",h)},[]);
  const doInstall=async()=>{if(!installPrompt)return;installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==="accepted")setShowInstall(false);setInstallPrompt(null)};

  useEffect(()=>{(async()=>{const saved=await ld();if(saved){if(saved.ck&&COLORS[saved.ck])setCk(saved.ck);if(saved.sk&&STYLES[saved.sk])setSk(saved.sk);if(typeof saved.hue==="number")setHue(saved.hue);if(typeof saved.brightness==="number")setBrightness(saved.brightness);if(saved.textAlign)setTextAlign(saved.textAlign);if(saved.d)setD({...EMPTY,...saved.d,images:[]});}setLoaded(true)})()},[]);
  useEffect(()=>{if(!loaded)return;const t=setTimeout(()=>sv({ck,sk,hue,brightness,textAlign,d:{...d,images:[]}}),1000);return()=>clearTimeout(t)},[ck,sk,hue,brightness,textAlign,d.orgName,d.subOrg,d.personName,d.personTitle,d.headline,d.bodyText,d.dateText,d.website,d.address,d.phone,d.headerTitle,d.headerTitleSize,loaded]);

  // Google Sheets license check (called from PWA with user email)
  useEffect(()=>{if(window.__userEmail&&LICENSE_SHEET_URL){checkLicenseFromSheet(window.__userEmail).then(ok=>setIsPro(ok))}},[]);

  const set=useCallback((k,v)=>setD(p=>({...p,[k]:v})),[]);
  const addImg=url=>setD(p=>({...p,images:[...p.images,{url,pos:"50% 50%",zoom:100}]}));
  const rmImg=i=>setD(p=>({...p,images:p.images.filter((_,j)=>j!==i)}));
  const setImgPos=(i,pos)=>setD(p=>({...p,images:p.images.map((img,j)=>j===i?{...img,pos}:img)}));
  const setImgZoom=(i,zoom)=>setD(p=>({...p,images:p.images.map((img,j)=>j===i?{...img,zoom}:img)}));

  const onImgDrag=(idx,pos)=>setImgPos(idx,pos);
  const onImgZoom=(idx,zoom)=>setImgZoom(idx,zoom);
  const onProfileDrag=(pos)=>set("profilePos",pos);
  const onProfileZoom=(zoom)=>set("profileZoom",zoom);

  const [pngResult,setPngResult]=useState(null);

  const usesPro=STYLES[sk]?.pro||(hue!==0&&!isPro)||(brightness!==100&&!isPro)||(headerWm&&!isPro);
  const handleExport=async()=>{
    if(usesPro){setShowProPopup(true);return}
    setExporting(true);setExportMsg("");setPngResult(null);
    try{
    if(!window.html2canvas){const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";document.head.appendChild(s);await new Promise((res,rej)=>{s.onload=res;s.onerror=()=>rej(new Error("โหลดไม่สำเร็จ"));setTimeout(()=>rej(new Error("Timeout")),10000)})}
    const wrap=wrapRef.current;if(!wrap)throw new Error("ไม่พบ");
    const orig=wrap.style.transform;wrap.style.transform="scale(1)";
    await new Promise(r=>setTimeout(r,300));
    const el=document.getElementById("main-preview");
    if(!el)throw new Error("ไม่พบ preview");
    const canvas=await window.html2canvas(el,{scale:2,useCORS:true,allowTaint:true,backgroundColor:"#ffffff",width:794,height:1123,logging:false});
    wrap.style.transform=orig;

    const dataUrl=canvas.toDataURL("image/png",1.0);

    // Try download
    try{
      const a=document.createElement("a");a.href=dataUrl;a.download=`newsletter_${new Date().toISOString().slice(0,10)}.png`;document.body.appendChild(a);a.click();document.body.removeChild(a);
    }catch(e){}

    // Try open in new tab
    try{const w=window.open("","_blank");if(w){w.document.write(`<!DOCTYPE html><html><head><title>Newsletter PNG</title><style>body{margin:0;display:flex;justify-content:center;background:#222;min-height:100vh}img{max-width:100%;height:auto}</style></head><body><img src="${dataUrl}"/></body></html>`);w.document.close()}}catch(e){}

    // Always show inline result
    setPngResult(dataUrl);
    setExportMsg("✅ สำเร็จ!");
  }catch(err){console.error(err);setExportMsg("❌ "+err.message);if(wrapRef.current)wrapRef.current.style.transform=`scale(${scale})`}setExporting(false)};

  const handleReset=()=>{setD(EMPTY);setHue(0);setBrightness(100);setHeaderWm("");setHeaderWmPos("50% 50%");setHeaderWmZoom(100);sv({ck,sk,hue:0,brightness:100,textAlign,d:EMPTY})};
  const shifted=shiftColors(COLORS[ck],hue);
  const ac=shifted.pri,fc2=shifted.sec;
  const imgInfo=useMemo(()=>{const n=d.images.length;if(n===0)return"ยังไม่มีรูป";const top=Math.min(n,3),bot=Math.max(0,n-3);let t=`${top} ด้านบน`;if(bot>0)t+=` + ${bot} ด้านล่าง`;return t},[d.images.length]);

  const userEmail=window.__userEmail||"";

  return(<>
    {/* PRO Purchase Popup */}
    {/* PNG Result — show image for save */}
    {pngResult&&<div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,.85)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setPngResult(null)}>
      <div style={{color:"#fff",fontFamily:"'Kanit',sans-serif",fontSize:16,marginBottom:12,textAlign:"center"}}>📥 กดค้างที่รูปเพื่อบันทึก</div>
      <div style={{maxWidth:"90vw",maxHeight:"75vh",overflow:"auto",borderRadius:8,boxShadow:"0 8px 40px rgba(0,0,0,.5)"}} onClick={e=>e.stopPropagation()}>
        <img src={pngResult} alt="Newsletter PNG" style={{width:"100%",height:"auto",display:"block"}}/>
      </div>
      <div style={{display:"flex",gap:10,marginTop:14}}>
        <a href={pngResult} download={`newsletter_${new Date().toISOString().slice(0,10)}.png`} style={{padding:"10px 24px",borderRadius:10,background:"linear-gradient(135deg,#4CAF50,#66BB6A)",color:"#fff",textDecoration:"none",fontSize:14,fontWeight:600,fontFamily:"'Kanit',sans-serif"}}>💾 ดาวน์โหลด</a>
        <button onClick={()=>setPngResult(null)} style={{padding:"10px 20px",borderRadius:10,border:"1px solid rgba(255,255,255,.3)",background:"transparent",color:"#fff",cursor:"pointer",fontSize:13}}>✕ ปิด</button>
      </div>
    </div>}

    {showProPopup&&<div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowProPopup(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:"28px 24px",maxWidth:420,width:"100%",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:36}}>⭐</div>
          <div style={{fontFamily:"'Kanit',sans-serif",fontSize:20,fontWeight:700,color:"#333"}}>อัพเกรด PRO</div>
          <div style={{fontSize:13,color:"#888",marginTop:4}}>เพียงวันละ 1 บาท (365 บาท/ปี)</div>
        </div>
        <div style={{background:"#f8f8ff",borderRadius:10,padding:14,marginBottom:16,fontSize:12,color:"#555",lineHeight:1.7}}>
          <div style={{fontWeight:600,marginBottom:6}}>ฟีเจอร์ PRO ที่ใช้งานอยู่:</div>
          {STYLES[sk]?.pro&&<div>✦ สไตล์ {STYLES[sk].icon} {STYLES[sk].name}</div>}
          {hue!==0&&<div>🎛️ Hue {hue}°</div>}
          {brightness!==100&&<div>☀️ Brightness {brightness}%</div>}

            {[0.3,0.4,0.52,0.65,0.8].map(s=>(<button key={s} onClick={()=>setScale(s)} style={{padding:"4px 10px",border:"none",borderRadius:50,background:scale===s?ac:"transparent",color:scale===s?"#fff":"#888",cursor:"pointer",fontSize:11,fontWeight:scale===s?600:400,fontFamily:"'Sarabun',sans-serif",minWidth:38}}>{Math.round(s*100)}%</button>))}
          </div>
        </div>
        <div style={{width:Math.ceil(794*scale),height:Math.ceil(1123*scale),flexShrink:0,margin:"8px auto 0"}}>
          <div ref={wrapRef} style={{transform:`scale(${scale})`,transformOrigin:"top left",width:794,height:1123}}>
            <Preview ck={ck} sk={sk} d={d} id="main-preview" hue={hue} brightness={brightness} headerWm={headerWm} headerWmPos={headerWmPos} headerWmZoom={headerWmZoom} textAlign={textAlign} isPro={isPro} onImgDrag={onImgDrag} onImgZoom={onImgZoom} onProfileDrag={onProfileDrag} onProfileZoom={onProfileZoom} onHdrWmDrag={p=>setHeaderWmPos(p)} onHdrWmZoom={z=>setHeaderWmZoom(z)}/>
          </div>
        </div>
        <div style={{height:30,flexShrink:0}}/>
      </div>
    </div></div>
  </>);
}

const GoogleIcon=()=>(<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>);

function LoginScreen(){
  const [error,setError]=useState("");const [loading,setLoading]=useState(false);
  const checkDomain=(email)=>{if(!ALLOWED_DOMAINS||ALLOWED_DOMAINS.length===0)return true;return ALLOWED_DOMAINS.some(d=>email.endsWith(d))};
  const handleGoogle=async()=>{setLoading(true);setError("");try{const r=await auth.signInWithPopup(googleProvider);if(!checkDomain(r.user.email)){await auth.signOut();setError(`อีเมล ${r.user.email} ไม่ได้รับอนุญาต`)}}catch(err){if(err.code!=="auth/popup-closed-by-user")setError(err.code==="auth/popup-blocked"?"กรุณาอนุญาต popup แล้วลองใหม่":err.message)}setLoading(false)};
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f8f6ff,#eef2ff,#f0f8ff)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400,background:"#fff",borderRadius:20,padding:"40px 32px",boxShadow:"0 20px 60px rgba(0,0,0,.08)",border:"1px solid #e8e8f0"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:56,marginBottom:10}}>📰</div>
          <div style={{fontFamily:"'Kanit',sans-serif",fontSize:26,fontWeight:700,color:"#333"}}>Newsletter Generator</div>
          <div style={{color:"#999",fontSize:14,marginTop:6}}>สร้างจดหมายข่าวประชาสัมพันธ์</div>
        </div>
        <button onClick={handleGoogle} disabled={loading} style={{width:"100%",padding:"14px 20px",border:"1px solid #ddd",borderRadius:12,background:"#fff",color:"#333",fontSize:16,fontWeight:600,fontFamily:"'Kanit',sans-serif",cursor:loading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12,opacity:loading?.6:1,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
          {loading?<span style={{color:"#999"}}>⏳ กำลังเข้าสู่ระบบ...</span>:<><GoogleIcon/><span>เข้าสู่ระบบด้วย Google</span></>}
        </button>
        {error&&<div style={{padding:"10px 14px",borderRadius:10,marginTop:14,fontSize:13,color:"#e74c3c",background:"#fef0ef",border:"1px solid #fcd",textAlign:"center"}}>{error}</div>}
        <div style={{textAlign:"center",marginTop:24,fontSize:11,color:"#bbb",lineHeight:1.6}}>
          เข้าสู่ระบบด้วยบัญชี Google ของคุณ
          {ALLOWED_DOMAINS&&ALLOWED_DOMAINS.length>0&&<><br/><span style={{color:"#999"}}>จำกัดเฉพาะ: {ALLOWED_DOMAINS.join(", ")}</span></>}
        </div>
      </div>
    </div>
  );
}

function Root(){
  const [user,setUser]=useState(null);const [checking,setChecking]=useState(true);
  useEffect(()=>{const unsub=auth.onAuthStateChanged(u=>{
    if(u&&ALLOWED_DOMAINS&&ALLOWED_DOMAINS.length>0){if(!ALLOWED_DOMAINS.some(d=>u.email.endsWith(d))){auth.signOut();setUser(null);setChecking(false);return}}
    if(u)window.__userEmail=u.email;
    setUser(u);setChecking(false)});return unsub},[]);
  if(checking)return(<div style={{minHeight:"100vh",background:"#f8f8ff",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontSize:48}}>📰</div><div style={{color:"#999",fontFamily:"'Kanit',sans-serif",fontSize:16}}>กำลังตรวจสอบ...</div></div>);
  if(!user)return <LoginScreen/>;
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 14px",background:"#fff",borderBottom:"1px solid #eee",flexShrink:0,fontSize:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {user.photoURL&&<img src={user.photoURL} style={{width:22,height:22,borderRadius:"50%"}} alt="" referrerPolicy="no-referrer"/>}
          <span style={{color:"#888"}}>{user.displayName||user.email}</span>
        </div>
        <button onClick={()=>auth.signOut()} style={{padding:"4px 12px",border:"1px solid #ddd",borderRadius:6,background:"#fafafa",color:"#888",cursor:"pointer",fontSize:11}}>ออกจากระบบ</button>
      </div>
      <div style={{flex:1,overflow:"hidden"}}><App/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
