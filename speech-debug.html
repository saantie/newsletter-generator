<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Speech Recognition Debugger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sarabun:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#0a0e17;color:#c8d6e5;min-height:100vh;padding:12px}
h1{font-family:'JetBrains Mono',monospace;font-size:16px;color:#00e676;margin-bottom:8px;display:flex;align-items:center;gap:8px}
h1 .dot{width:10px;height:10px;border-radius:50%;background:#00e676;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.info-bar{background:#131a2b;border:1px solid #1e2d4a;border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px;font-family:'JetBrains Mono',monospace;line-height:1.6}
.info-bar span{color:#ffd54f}

.controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.btn{padding:10px 16px;border-radius:8px;border:none;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;min-height:44px}
.btn-start{background:#00e676;color:#0a0e17}
.btn-start:active{background:#00c853}
.btn-start.recording{background:#ef5350;color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,83,80,.4)}50%{box-shadow:0 0 0 10px rgba(239,83,80,0)}}
.btn-clear{background:#1e2d4a;color:#78909c}
.btn-export{background:#1e2d4a;color:#ffd54f}

.opt{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.opt label{font-size:13px;display:flex;align-items:center;gap:4px;background:#131a2b;padding:6px 10px;border-radius:6px;border:1px solid #1e2d4a}
.opt input[type=checkbox]{accent-color:#00e676;width:18px;height:18px}
.opt select{background:#131a2b;color:#c8d6e5;border:1px solid #1e2d4a;border-radius:6px;padding:6px 8px;font-size:13px}

.result-box{background:#0d1520;border:1px solid #1e2d4a;border-radius:8px;padding:10px;margin-bottom:10px;min-height:60px;font-size:14px;line-height:1.6;word-break:break-word}
.result-box .final{color:#e0e0e0}
.result-box .interim{color:#ffd54f;opacity:.7;font-style:italic}

.log-wrap{background:#0d1520;border:1px solid #1e2d4a;border-radius:8px;overflow:hidden;max-height:55vh;display:flex;flex-direction:column}
.log-header{background:#131a2b;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#78909c;border-bottom:1px solid #1e2d4a;display:flex;justify-content:space-between;position:sticky;top:0}
.log-header .counter{color:#ffd54f}
.log{overflow-y:auto;padding:6px;flex:1}
.log-entry{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.5;padding:3px 6px;border-radius:4px;margin-bottom:2px;display:flex;gap:8px;word-break:break-word}
.log-entry:nth-child(odd){background:rgba(255,255,255,.02)}
.log-entry .ts{color:#546e7a;white-space:nowrap;flex-shrink:0}
.log-entry .ev{min-width:70px;flex-shrink:0;font-weight:700}
.ev-start{color:#00e676}
.ev-result{color:#42a5f5}
.ev-end{color:#ffd54f}
.ev-error{color:#ef5350}
.ev-info{color:#78909c}
.ev-warn{color:#ff9800}
.ev-mic{color:#ab47bc}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:6px;margin-bottom:10px}
.stat{background:#131a2b;border:1px solid #1e2d4a;border-radius:8px;padding:8px 10px;text-align:center}
.stat .n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#00e676}
.stat .l{font-size:11px;color:#546e7a;margin-top:2px}
</style>
</head>
<body>
<h1><span class="dot"></span>Speech Debug — Android</h1>

<div class="info-bar" id="deviceInfo"></div>

<div class="stats">
  <div class="stat"><div class="n" id="sStart">0</div><div class="l">start()</div></div>
  <div class="stat"><div class="n" id="sEnd">0</div><div class="l">onend</div></div>
  <div class="stat"><div class="n" id="sResult">0</div><div class="l">onresult</div></div>
  <div class="stat"><div class="n" id="sError">0</div><div class="l">onerror</div></div>
  <div class="stat"><div class="n" id="sEmpty">0</div><div class="l">empty ends</div></div>
  <div class="stat"><div class="n" id="sAvgLife">-</div><div class="l">avg life (ms)</div></div>
</div>

<div class="opt">
  <label><input type="checkbox" id="optContinuous"> continuous</label>
  <label><input type="checkbox" id="optInterim" checked> interimResults</label>
  <label><input type="checkbox" id="optRestart" checked> auto-restart</label>
  <label>delay <select id="optDelay">
    <option value="0">0ms</option>
    <option value="150">150ms</option>
    <option value="300" selected>300ms</option>
    <option value="500">500ms</option>
    <option value="800">800ms</option>
    <option value="1200">1200ms</option>
    <option value="2000">2000ms</option>
  </select></label>
  <label><input type="checkbox" id="optProbe"> mic probe ก่อน start</label>
</div>

<div class="controls">
  <button class="btn btn-start" id="btnToggle">🎤 เริ่มบันทึก</button>
  <button class="btn btn-clear" onclick="clearLog()">🗑 ล้าง log</button>
  <button class="btn btn-export" onclick="exportLog()">📋 Copy log</button>
</div>

<div class="result-box" id="resultBox"><span style="color:#546e7a">ข้อความจะแสดงที่นี่...</span></div>

<div class="log-wrap">
  <div class="log-header"><span>Event Log</span><span class="counter" id="logCount">0 events</span></div>
  <div class="log" id="logBox"></div>
</div>

<script>
const $ = id => document.getElementById(id);

/* ── device info ── */
const ua = navigator.userAgent;
const isAndroid = /Android/i.test(ua);
const chromeVer = (ua.match(/Chrome\/(\d+)/)||[])[1]||'?';
const androidVer = (ua.match(/Android\s([\d.]+)/)||[])[1]||'N/A';
const hasSR = 'SpeechRecognition' in window;
const hasWebkit = 'webkitSpeechRecognition' in window;
$('deviceInfo').innerHTML =
  `<div>UA: <span>${ua.slice(0,100)}...</span></div>`+
  `<div>Android: <span>${androidVer}</span> | Chrome: <span>${chromeVer}</span> | isAndroid: <span>${isAndroid}</span></div>`+
  `<div>SpeechRecognition: <span>${hasSR}</span> | webkit: <span>${hasWebkit}</span></div>`;

/* ── state ── */
let rec = null;
let wantRec = false;
let base = '', final = '';
let sessionStart = 0;
let gotResult = false;
let logs = [];
let stats = { start:0, end:0, result:0, error:0, empty:0, lifetimes:[] };

/* ── logging ── */
function log(ev, cls, msg) {
  const now = new Date();
  const ts = now.toTimeString().slice(0,8) + '.' + String(now.getMilliseconds()).padStart(3,'0');
  const entry = { ts, ev, msg, cls };
  logs.push(entry);

  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="ts">${ts}</span><span class="ev ev-${cls}">${ev}</span><span>${msg}</span>`;
  const box = $('logBox');
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  $('logCount').textContent = logs.length + ' events';
}

function updateStats() {
  $('sStart').textContent = stats.start;
  $('sEnd').textContent = stats.end;
  $('sResult').textContent = stats.result;
  $('sError').textContent = stats.error;
  $('sEmpty').textContent = stats.empty;
  if(stats.lifetimes.length > 0) {
    const avg = Math.round(stats.lifetimes.reduce((a,b)=>a+b,0)/stats.lifetimes.length);
    $('sAvgLife').textContent = avg;
  }
}

/* ── mic probe ── */
async function probeMic() {
  log('MIC_PROBE','mic','getUserMedia({audio:true}) ...');
  try {
    const t0 = performance.now();
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const tracks = stream.getTracks();
    log('MIC_OK','mic',`สำเร็จ (${Math.round(performance.now()-t0)}ms) tracks:${tracks.length} label:"${tracks[0]?.label}"`);
    tracks.forEach(t => t.stop());
    log('MIC_RELEASE','mic','tracks stopped, รอ 300ms...');
    await new Promise(r => setTimeout(r, 300));
    return true;
  } catch(e) {
    log('MIC_FAIL','error',`${e.name}: ${e.message}`);
    return false;
  }
}

/* ── speech recognition ── */
async function startSession() {
  if(!wantRec) return;
  if(rec) {
    log('SKIP','warn','instance ยังอยู่ — ข้าม startSession');
    return;
  }

  const useProbe = $('optProbe').checked;
  if(useProbe) {
    const ok = await probeMic();
    if(!ok) { stopAll(); return; }
  }

  const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
  if(!SR) { log('NO_SR','error','ไม่รองรับ SpeechRecognition'); return; }

  const r = new SR();
  r.lang = 'th-TH';
  r.continuous = $('optContinuous').checked;
  r.interimResults = $('optInterim').checked;

  final = '';
  gotResult = false;
  sessionStart = performance.now();

  r.onstart = () => {
    log('START','start',`continuous:${r.continuous} interim:${r.interimResults}`);
  };

  r.onaudiostart = () => log('AUDIO_START','start','mic audio stream เริ่ม');
  r.onsoundstart = () => log('SOUND_START','start','ตรวจพบเสียง');
  r.onspeechstart = () => log('SPEECH_START','start','ตรวจพบเสียงพูด');
  r.onspeechend = () => log('SPEECH_END','end','หยุดพูด');
  r.onsoundend = () => log('SOUND_END','end','เสียงหยุด');
  r.onaudioend = () => log('AUDIO_END','end','mic audio stream จบ');

  r.onresult = (e) => {
    gotResult = true;
    stats.result++;
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      const c = e.results[i][0].confidence;
      if(e.results[i].isFinal) {
        final += t;
        log('RESULT_FINAL','result',`"${t}" (conf:${c.toFixed(2)}) idx:${i}`);
      } else {
        interim = t;
        log('RESULT_INTERIM','result',`"${t}" idx:${i}`);
      }
    }
    $('resultBox').innerHTML =
      `<span class="final">${base + final}</span><span class="interim">${interim}</span>`;
    updateStats();
  };

  r.onend = () => {
    const life = Math.round(performance.now() - sessionStart);
    stats.end++;
    stats.lifetimes.push(life);
    const hadResult = gotResult;
    if(!hadResult) stats.empty++;

    log('END','end',`session จบ (${life}ms) hadResult:${hadResult} wantRec:${wantRec}`);

    /* flush */
    if(final) { base += final; final = ''; }
    rec = null;

    /* restart? */
    if(wantRec && $('optRestart').checked) {
      const delay = parseInt($('optDelay').value) || 0;
      log('RESTART','warn',`จะ restart ใน ${delay}ms...`);
      setTimeout(() => { if(wantRec) startSession(); }, delay);
    } else if(!wantRec) {
      updateBtn(false);
    }
    updateStats();
  };

  r.onerror = (e) => {
    stats.error++;
    log('ERROR','error',`${e.error}: ${e.message||'(no msg)'}`);
    if(e.error !== 'no-speech' && e.error !== 'aborted') {
      /* fatal error */
      log('FATAL','error','หยุดเพราะ error ที่ไม่ใช่ no-speech/aborted');
      stopAll();
    }
    updateStats();
  };

  rec = r;
  stats.start++;
  updateStats();
  log('CALL_START','start','r.start() ...');
  try {
    r.start();
  } catch(e) {
    log('START_FAIL','error',`${e.name}: ${e.message}`);
    stopAll();
  }
}

function stopAll() {
  wantRec = false;
  if(rec) {
    log('STOP','warn','abort + clear handlers');
    rec.onend = null;
    rec.onresult = null;
    rec.onerror = null;
    rec.onstart = null;
    try { rec.abort(); } catch(e) {}
    rec = null;
  }
  updateBtn(false);
}

function updateBtn(on) {
  const b = $('btnToggle');
  if(on) {
    b.textContent = '⏹ หยุดบันทึก';
    b.classList.add('recording');
  } else {
    b.textContent = '🎤 เริ่มบันทึก';
    b.classList.remove('recording');
  }
}

$('btnToggle').addEventListener('click', () => {
  if(wantRec) {
    stopAll();
  } else {
    base = ''; final = '';
    $('resultBox').innerHTML = '<span style="color:#546e7a">กำลังฟัง...</span>';
    wantRec = true;
    updateBtn(true);
    startSession();
  }
});

function clearLog() {
  logs = [];
  stats = { start:0, end:0, result:0, error:0, empty:0, lifetimes:[] };
  $('logBox').innerHTML = '';
  $('logCount').textContent = '0 events';
  $('resultBox').innerHTML = '<span style="color:#546e7a">ข้อความจะแสดงที่นี่...</span>';
  updateStats();
}

function exportLog() {
  const text = logs.map(l => `${l.ts} [${l.ev}] ${l.msg}`).join('\n');
  const info = $('deviceInfo').innerText;
  const full = `=== Device ===\n${info}\n\n=== Settings ===\ncontinuous:${$('optContinuous').checked} interim:${$('optInterim').checked} restart:${$('optRestart').checked} delay:${$('optDelay').value}ms probe:${$('optProbe').checked}\n\n=== Stats ===\nstart:${stats.start} end:${stats.end} result:${stats.result} error:${stats.error} empty:${stats.empty} avgLife:${$('sAvgLife').textContent}ms\n\n=== Log ===\n${text}`;

  if(navigator.clipboard) {
    navigator.clipboard.writeText(full).then(()=>alert('Copied!')).catch(()=>fallbackCopy(full));
  } else { fallbackCopy(full); }
}
function fallbackCopy(t) {
  const ta = document.createElement('textarea');
  ta.value = t; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta); alert('Copied!');
}
</script>
</body>
</html>
